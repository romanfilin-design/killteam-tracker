<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kill Team Solo Tracker</title>
</head>
<body>
<style>
  :root{
    --bg:#161618;
    --panel:#1c1e21;
    --panel2:#222428;
    --line:#34373c;
    --line-soft:#2a2c30;
    --orange:#e8541e;
    --orange-dim:#7a3015;
    --text:#e9e7e2;
    --text-dim:#9a9a96;
    --text-faint:#6b6c6e;
    --hp-ok:#5a9c5e;
    --hp-mid:#c98a2c;
    --hp-low:#b8392f;
    --teamA:#3a8fd4;
    --teamB:#c9482e;
    font-family:'Bahnschrift','Segoe UI',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  .kt-root{
    background:var(--bg);color:var(--text);min-height:100vh;
    padding:18px;font-size:14px;line-height:1.4;
  }
  .kt-root *{box-sizing:border-box;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .kt-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--orange);font-weight:700;}
  .kt-h1{font-size:22px;font-weight:700;letter-spacing:0.5px;margin-top:2px;margin-bottom:14px;}
  .kt-h2{font-size:15px;font-weight:700;letter-spacing:0.3px;margin:0 0 8px 0;color:var(--text);}
  .kt-muted{color:var(--text-dim);font-size:12px;}
  .kt-faint{color:var(--text-faint);font-size:11px;}

  /* ===== Tabs (Setup / Game) ===== */
  .kt-tabbar{display:flex;gap:6px;margin-bottom:16px;}
  .kt-tab{
    background:var(--panel);border:1px solid var(--line);color:var(--text-dim);
    padding:7px 16px;font-size:12px;letter-spacing:1px;text-transform:uppercase;
    cursor:pointer;border-radius:3px;
  }
  .kt-tab.active{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}

  /* ===== Cards / panels ===== */
  .kt-panel{
    background:var(--panel);border:1px solid var(--line);padding:14px;margin-bottom:14px;
  }
  .kt-panel-title{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);
    margin-bottom:10px;border-bottom:1px solid var(--line-soft);padding-bottom:6px;
  }

  /* ===== Setup: two-column team config ===== */
  .kt-setup-teams{display:grid;grid-template-columns:1fr;gap:16px;}

  .kt-setup-team{
    background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--team-color);padding:14px;
  }
  .kt-setup-team.team-a{--team-color:var(--teamA);}
  .kt-setup-team.team-b{--team-color:var(--teamB);}

  .kt-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .kt-select{
    background:var(--panel2);border:1px solid var(--line);color:var(--text);
    padding:6px 8px;border-radius:3px;font-size:13px;flex:1;min-width:120px;
  }
  .kt-btn{
    background:var(--panel2);border:1px solid var(--line);color:var(--text);
    padding:6px 12px;border-radius:3px;font-size:12px;cursor:pointer;letter-spacing:0.5px;
  }
  .kt-btn:hover{border-color:var(--orange);color:var(--orange);}
  .kt-btn.primary{background:var(--orange-dim);border-color:var(--orange);color:#ffd9c4;}
  .kt-btn.primary:hover{color:#fff;}
  .kt-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .kt-btn:disabled:hover{border-color:var(--line);color:var(--text);}

  .kt-hidden-file{display:none;}

  /* Roster preview list */
  .kt-roster-list{margin:8px 0;display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:4px;}
  .kt-roster-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:5px 8px;background:var(--panel2);border:1px solid var(--line-soft);
    margin-bottom:4px;font-size:12px;border-radius:2px;
  }
  .kt-roster-item .w{color:var(--text-faint);font-family:'Consolas',monospace;}

  /* Archetype pills */
  .kt-archetype-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .kt-archetype-pill{
    background:var(--panel2);border:1px solid var(--line);color:var(--text-dim);
    padding:5px 12px;border-radius:14px;font-size:11px;cursor:pointer;letter-spacing:0.5px;
  }
  .kt-archetype-pill.active{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}

  /* Choice cards (Tac Op / Crit Op / Equipment) */
  #critOpChoices{display:grid;grid-template-columns:repeat(auto-fill, minmax(380px, 1fr));gap:8px;align-items:start;}
  #critOpChoices .kt-choice-card{margin-bottom:0;}
  .kt-choice-card{
    background:var(--panel2);border:1px solid var(--line-soft);padding:10px 12px;margin-bottom:8px;
    cursor:pointer;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .kt-choice-card.selected{border-color:var(--orange);box-shadow:inset 0 0 0 1px var(--orange);}
  .kt-choice-card.disabled{opacity:0.4;cursor:not-allowed;}
  .kt-choice-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .kt-choice-name{font-weight:600;font-size:13px;}
  .kt-choice-tag{font-size:9px;color:var(--text-faint);letter-spacing:1px;text-transform:uppercase;}
  .kt-choice-check{
    width:16px;height:16px;border-radius:3px;border:1.5px solid var(--text-faint);flex-shrink:0;
  }
  .kt-choice-card.selected .kt-choice-check{background:var(--orange);border-color:var(--orange);}
  .kt-choice-desc{font-size:11.5px;color:var(--text-dim);line-height:1.5;}
  .kt-choice-desc b{color:var(--text);font-weight:600;}

  .kt-equipment-counter{
    font-size:11px;color:var(--text-dim);margin-bottom:8px;letter-spacing:0.5px;
  }
  .kt-equipment-counter.full{color:var(--orange);}

  /* ===== Start game CTA ===== */
  .kt-start-row{display:flex;justify-content:center;margin:18px 0 8px;}
  .kt-start-btn{
    background:var(--orange);border:none;color:#1c1100;font-weight:700;
    padding:12px 32px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
    cursor:pointer;border-radius:3px;
  }
  .kt-start-btn:hover{background:#ff6a35;}
  .kt-start-btn:disabled{background:var(--line);color:var(--text-faint);cursor:not-allowed;}

  /* ===== Game screen: reference bar ===== */
  .kt-ref-bar{
    background:var(--panel);border:1px solid var(--line);padding:10px 14px;margin-bottom:14px;
  }
  .kt-ref-toggle{
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;
  }
  .kt-ref-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:700;}
  .kt-ref-body{display:none;margin-top:12px;}
  .kt-ref-body.open{display:block;}
  .kt-ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:880px){.kt-ref-grid{grid-template-columns:1fr;}}
  .kt-ref-section{background:var(--panel2);border:1px solid var(--line-soft);padding:10px 12px;}
  .kt-ref-section h4{margin:0 0 6px 0;font-size:12px;color:var(--text);letter-spacing:0.5px;}
  .kt-ref-section .sub{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .kt-ref-section p{margin:0 0 6px 0;font-size:11.5px;color:var(--text-dim);line-height:1.5;}
  .kt-ref-eq-list{display:flex;flex-wrap:wrap;gap:5px;}
  .kt-ref-eq-chip{
    font-size:10px;padding:3px 8px;border-radius:10px;background:var(--panel);
    border:1px solid var(--line-soft);color:var(--text-dim);
  }

  .kt-killgrade-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px;}
  .kt-killgrade-table th,.kt-killgrade-table td{
    border:1px solid var(--line-soft);padding:3px 6px;text-align:center;font-family:'Consolas',monospace;
  }
  .kt-killgrade-table th{color:var(--text-dim);font-family:inherit;}
  .kt-killgrade-table tr.current-row td{background:var(--orange-dim);color:#ffd9c4;}

  /* ===== Header / TP block (game screen) ===== */
  .kt-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .kt-tp-block{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);padding:8px 14px;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
  .kt-tp-label{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
  .kt-tp-num{font-size:26px;font-weight:700;color:var(--orange);font-family:'Consolas',monospace;min-width:26px;text-align:center;}
  .kt-tp-btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);width:26px;height:26px;border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .kt-tp-btn:hover{border-color:var(--orange);color:var(--orange);}
  .kt-reset-btn{background:transparent;border:1px solid var(--line);color:var(--text-dim);font-size:11px;padding:5px 10px;border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
  .kt-reset-btn:hover{border-color:var(--orange);color:var(--orange);}

  /* ===== Teams grid (game) ===== */
  .kt-teams{display:grid;grid-template-columns:1fr;gap:16px;}
  .kt-team{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--team-color);padding:14px;}
  .kt-team.team-a{--team-color:var(--teamA);}
  .kt-team.team-b{--team-color:var(--teamB);}
  .kt-team-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
  .kt-team-name{font-size:16px;font-weight:700;letter-spacing:0.5px;background:transparent;border:none;color:var(--text);border-bottom:1px solid transparent;padding:2px 0;min-width:60px;}
  .kt-team-name:hover,.kt-team-name:focus{border-bottom:1px dashed var(--text-faint);outline:none;}
  .kt-stats-row{display:flex;gap:8px;}
  .kt-stat-pill{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);padding:4px 8px;border-radius:3px;}
  .kt-stat-pill .lbl{font-size:10px;color:var(--text-dim);letter-spacing:1px;}
  .kt-stat-pill .val{font-family:'Consolas',monospace;font-weight:700;font-size:15px;min-width:18px;text-align:center;color:var(--text);}
  .kt-stat-pill button{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:13px;width:16px;height:16px;line-height:1;}
  .kt-stat-pill button:hover{color:var(--orange);}
  .kt-add-op{width:100%;margin-top:8px;padding:7px;background:var(--panel2);border:1px dashed var(--line);color:var(--text-dim);cursor:pointer;font-size:12px;letter-spacing:1px;text-transform:uppercase;border-radius:3px;}
  .kt-add-op:hover{border-color:var(--orange);color:var(--orange);}

  /* Operator card */
  .kt-ops-list{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:8px;align-items:start;}
  .kt-op{background:var(--panel2);border:1px solid var(--line-soft);margin-bottom:0;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);transition:opacity .2s, filter .2s;}
  .kt-op.injured{border-color:var(--hp-mid);}
  .kt-op.dead{opacity:0.55;filter:grayscale(0.6);}
  .kt-op.activated{box-shadow:inset 0 0 0 1px var(--orange);}
  .kt-op-top{display:flex;align-items:center;gap:8px;padding:8px 10px 4px 10px;}
  .kt-op-portrait{width:34px;height:34px;border-radius:4px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;background:var(--panel);}
  .kt-statblock{display:flex;gap:1px;margin:2px 10px 6px;background:var(--line-soft);border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .kt-stat-cell{flex:1;text-align:center;padding:4px 2px;background:var(--panel);}
  .kt-stat-cell-lbl{font-size:8px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;}
  .kt-stat-cell-val{font-size:15px;font-weight:700;color:var(--orange);font-family:'Consolas',monospace;line-height:1.2;}
  .kt-op-activated-toggle{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--text-faint);background:transparent;cursor:pointer;flex-shrink:0;}
  .kt-op-activated-toggle.on{background:var(--orange);border-color:var(--orange);}
  .kt-op-name{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-weight:600;min-width:40px;padding:1px 0;border-bottom:1px solid transparent;}
  .kt-op-name:hover,.kt-op-name:focus{border-bottom:1px dashed var(--text-faint);outline:none;}
  .kt-op-name.dead-strike{text-decoration:line-through;color:var(--text-faint);}
  .kt-op-remove{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0;}
  .kt-op-remove:hover{color:var(--hp-low);}
  .kt-op-wounds-row{display:flex;align-items:center;gap:6px;padding:0 10px 6px 10px;}
  .kt-wound-num{font-family:'Consolas',monospace;font-size:12px;color:var(--text-dim);min-width:44px;}
  .kt-wound-track{flex:1;display:flex;gap:2px;height:14px;cursor:pointer;}
  .kt-wound-seg{flex:1;background:var(--line-soft);border-radius:1px;}
  .kt-wound-seg.filled{background:var(--hp-ok);}
  .kt-wound-seg.filled.mid{background:var(--hp-mid);}
  .kt-wound-seg.filled.low{background:var(--hp-low);}
  .kt-op-controls{display:flex;align-items:center;gap:4px;padding:0 10px 8px 10px;flex-wrap:wrap;}
  .kt-dmg-btn{background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:11px;padding:3px 7px;border-radius:3px;cursor:pointer;font-family:'Consolas',monospace;}
  .kt-dmg-btn:hover{border-color:var(--hp-low);color:var(--hp-low);}
  .kt-heal-btn:hover{border-color:var(--hp-ok);color:var(--hp-ok);}
  .kt-maxw-edit{width:34px;background:var(--panel);border:1px solid var(--line);color:var(--text-dim);font-size:11px;padding:3px 2px;border-radius:3px;text-align:center;margin-left:auto;}
  .kt-maxw-lbl{font-size:9px;color:var(--text-faint);letter-spacing:1px;}
  .kt-op-tokens{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 10px 10px;}
  .kt-token{font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid var(--line);color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;background:var(--panel);display:flex;align-items:center;gap:4px;}
  .kt-token.active{background:var(--orange-dim);border-color:var(--orange);color:#ffd9c4;}
  .kt-token-x{font-size:11px;}
  .kt-token-add{font-size:10px;padding:2px 8px;border-radius:10px;border:1px dashed var(--line);color:var(--text-faint);background:transparent;cursor:pointer;}
  .kt-token-add:hover{border-color:var(--orange);color:var(--orange);}
  .kt-quick-tokens{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 8px 10px;}
  .kt-quick-token-btn{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--line-soft);color:var(--text-faint);background:transparent;cursor:pointer;letter-spacing:0.5px;}
  .kt-quick-token-btn:hover{border-color:var(--orange);color:var(--orange);}
  .kt-order-btn{
    display:flex;flex-direction:column;align-items:center;gap:1px;
    background:var(--panel);border:1px solid var(--line);color:var(--text-faint);
    border-radius:4px;cursor:pointer;padding:3px 8px 2px;margin-right:4px;line-height:1;
  }
  .kt-order-btn .kt-order-label{font-size:8px;letter-spacing:0.5px;text-transform:uppercase;}
  .kt-order-btn:hover{border-color:var(--orange);color:var(--orange);}
  .kt-order-btn.conceal{border-color:#6c8cd5;color:#9db4e8;background:rgba(58,143,212,0.12);}
  .kt-order-btn.engage{border-color:var(--orange);color:#ffb088;background:var(--orange-dim);}
  .kt-activation-summary{font-size:11px;color:var(--text-dim);margin-top:4px;padding-top:6px;border-top:1px solid var(--line-soft);}

  /* killgrade mini badge on team header */
  .kt-killgrade-badge{font-size:10px;color:var(--text-dim);background:var(--panel2);border:1px solid var(--line);padding:3px 8px;border-radius:3px;}

  /* ===== Footer ===== */
  .kt-footer{display:flex;justify-content:center;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .kt-footer button{background:var(--panel);border:1px solid var(--line);color:var(--text-dim);font-size:11px;padding:7px 14px;border-radius:3px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
  .kt-footer button:hover{border-color:var(--orange);color:var(--orange);}
  .kt-status{text-align:center;font-size:10px;color:var(--text-faint);margin-top:8px;letter-spacing:1px;}
</style>

<div class="kt-root" id="ktRoot">

  <div>
    <div class="kt-eyebrow">Kill Team &middot; Solo Tracker</div>
    <div class="kt-h1">Battle Log</div>
  </div>

  <div class="kt-tabbar">
    <button class="kt-tab" id="tabSetup">Подготовка</button>
    <button class="kt-tab" id="tabGame">Игра</button>
  </div>

  <!-- ============ SETUP SCREEN ============ -->
  <div id="screenSetup">

    <div class="kt-panel">
      <div class="kt-panel-title" style="display:flex;justify-content:space-between;align-items:center;border-bottom:none;margin-bottom:6px;padding-bottom:0;">
        <span>Crit Op</span>
        <button class="kt-btn" id="randomCritOpBtn">🎲 Случайный выбор</button>
      </div>
      <div class="kt-muted" style="margin-bottom:10px;">Договоритесь с соперником и выберите одинаковый Crit Op на обоих трекерах вручную.</div>
      <div id="critOpChoices"></div>
    </div>

    <div class="kt-setup-teams" id="setupTeamsContainer"></div>

    <div class="kt-start-row">
      <button class="kt-start-btn" id="startGameBtn">Начать партию →</button>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="screenGame" style="display:none;">

    <div class="kt-ref-bar">
      <div class="kt-ref-toggle" id="refToggle">
        <span class="kt-ref-title">Карточки этой партии</span>
        <span class="kt-faint" id="refToggleHint">показать ▾</span>
      </div>
      <div class="kt-ref-body" id="refBody"></div>
    </div>

    <div class="kt-header">
      <div></div>
      <div class="kt-tp-block">
        <div>
          <div class="kt-tp-label">Turning Point</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <button class="kt-tp-btn" id="tpMinus">−</button>
            <div class="kt-tp-num" id="tpNum">1</div>
            <button class="kt-tp-btn" id="tpPlus">+</button>
          </div>
        </div>
        <button class="kt-reset-btn" id="resetActivations" title="Сбросить отметки активации и приказы операторов (новый turning point)">Новый TP: сброс</button>
      </div>
    </div>

    <div class="kt-teams" id="teamsContainer"></div>

    <div class="kt-footer">
      <button id="backToSetupBtn">← Подготовка</button>
      <button id="exportBtn">Экспорт JSON</button>
      <button id="importBtn">Импорт JSON</button>
      <button id="newGameBtn">Новая партия</button>
      <input type="file" id="importFile" class="kt-hidden-file" accept="application/json">
    </div>
    <div class="kt-status" id="statusLine">сохранено</div>
  </div>

</div>

<script>
// ===================== DATA =====================
const CRIT_OPS = [
  { id: 'secure', name: 'Secure',
    action: 'SECURE (1AP) — маркер, контролируемый активным оператором, становится secured твоей командой, пока враг его не secure-ит. Нельзя в 1-й turning point или в control range врага.',
    vp: 'В конце каждого turning point после первого: 1VP если хотя бы один маркер secured твоей командой; ещё 1VP если твоя команда secure-ит больше маркеров, чем оппонент.' },
  { id: 'loot', name: 'Loot',
    action: 'LOOT (1AP) — маркер, контролируемый активным оператором, разграблен. Нельзя в 1-й turning point, в control range врага, или если маркер уже разграблен в этот turning point.',
    vp: 'Каждый раз при выполнении Loot — 1VP (максимум 2VP за turning point).' },
  { id: 'transmission', name: 'Transmission',
    action: 'INITIATE TRANSMISSION (1AP) — маркер, контролируемый активным оператором, транслирует до начала следующего turning point. Нельзя в 1-й turning point или в control range врага.',

// Загрузка данных команд из внешнего teams.json (работает на http/https-хостинге).
// При неудаче остаётся встроенный фоллбэк выше.
async function loadTeamsData(){
  try{
    const res = await fetch('teams.json', {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if(data && data.killTeams && typeof data.killTeams === 'object'){
      KILL_TEAMS = data.killTeams;
    }
    if(data && data.factionEquipment && typeof data.factionEquipment === 'object'){
      FACTION_EQUIPMENT = data.factionEquipment;
    }
    return true;
  } catch(e){
    // teams.json недоступен (локальное открытие через file:// или файл отсутствует) —
    // молча используем встроенный фоллбэк
    return false;
  }
}

// ===================== STATE =====================
const STORAGE_KEY = 'killteam_solo_state_v1';
function uid(){ return Math.random().toString(36).slice(2,9); }

function defaultOperator(name, wounds, stats){
  stats = stats || {};
  return {
    id: uid(), name, maxWounds: wounds, wounds,
    activated:false, tokens: [], order: null,
    apl: (stats.apl !== undefined ? stats.apl : null),
    move: (stats.move !== undefined ? stats.move : null),
    save: (stats.save !== undefined ? stats.save : null),
    portrait: (stats.portrait !== undefined ? stats.portrait : null),
  };
}

function blankTeam(id, name, color){
  return {
    id, name, color, cp:2, vp:0,
    operators: [],
    archetype: null,
    tacOpId: null,
    killGrade: 0,
    killTeamName: null,
    poolCounts: {},
    equipmentIds: [],
  };
}

function defaultState(){
  return {
    phase: 'setup', // 'setup' | 'game'
    tp: 1,
    critOpId: null,
    teams: [ blankTeam('A','Моя команда','teamA') ],
    enemyOperativeCount: 10, // для расчёта Kill Grade — сколько операторов у соперника (вводится вручную)
  };
}

let state = null;
const root = document.getElementById('ktRoot');

function setStatus(msg, transient){
  const el = document.getElementById('statusLine');
  if(!el) return;
  el.textContent = msg;
  if(transient) setTimeout(()=>{ if(el) el.textContent = 'сохранено'; }, 1400);
}

let saveTimer = null;
function save(){
  setStatus('сохранение…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus('сохранено', true);
    } catch(e){
      // Safari в приватном режиме может запрещать запись в localStorage
      setStatus('не удалось сохранить (приватный режим?)', true);
    }
  }, 250);
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
  } catch(e){ state = defaultState(); }
  // миграция старых сохранений без новых полей
  if(state && Array.isArray(state.teams)){
    if(state.teams.length > 1) state.teams = [state.teams[0]]; // solo-версия — только одна команда
    state.teams.forEach(t => {
      if(t.killTeamName === undefined) t.killTeamName = null;
      if(!t.poolCounts) t.poolCounts = {};
      if(!t.equipmentIds) t.equipmentIds = [];

      // ищем определение оператора по имени в составе выбранного Kill Team,
      // чтобы дотянуть статы к уже сохранённым операторам (партии, начатой до добавления статблока)
      const kt = t.killTeamName ? KILL_TEAMS[t.killTeamName] : null;
      const findDef = (name) => {
        if(!kt) return null;
        const inReq = (kt.required||[]).find(r=>r.name===name);
        if(inReq) return inReq;
        return (kt.pool||[]).find(p=>p.name===name) || null;
      };

      (t.operators||[]).forEach(o => {
        if(o.order === undefined) o.order = null;
        const def = findDef(o.name);
        // подтягиваем статы из определения, если у оператора их ещё нет
        if(o.apl === undefined || o.apl === null) o.apl = def && def.apl !== undefined ? def.apl : (o.apl ?? null);
        if(o.move === undefined || o.move === null) o.move = def && def.move !== undefined ? def.move : (o.move ?? null);
        if(o.save === undefined || o.save === null) o.save = def && def.save !== undefined ? def.save : (o.save ?? null);
        if(o.portrait === undefined || o.portrait === null) o.portrait = def && def.portrait !== undefined ? def.portrait : (o.portrait ?? null);
      });
    });
    delete state.equipmentIds; // было общим на партию в старой версии
    if(state.enemyOperativeCount === undefined) state.enemyOperativeCount = 10;
  }
  renderAll();
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function findTeam(id){ return state.teams.find(t=>t.id===id); }
function findOp(team, opId){ return team.operators.find(o=>o.id===opId); }

// Пересобирает team.operators из required + poolCounts выбранного kill team.
// Существующие операторы с тем же именем переиспользуются как есть (сохраняя HP/токены),
// лишние по количеству — удаляются с конца, недостающие — добавляются как новые (max HP).
function rebuildOperatorsFromKillTeam(team){
  const kt = KILL_TEAMS[team.killTeamName];
  if(!kt) return;

  const statsOf = (def) => ({ apl:def.apl, move:def.move, save:def.save, portrait:def.portrait });

  const wanted = []; // [{name, wounds, stats}]
  kt.required.forEach(r => { for(let i=0;i<r.count;i++) wanted.push({name:r.name, wounds:r.wounds, stats:statsOf(r)}); });
  Object.entries(team.poolCounts || {}).forEach(([name, count]) => {
    const def = kt.pool.find(p=>p.name===name);
    if(!def) return;
    for(let i=0;i<count;i++) wanted.push({name, wounds:def.wounds, stats:statsOf(def)});
  });

  const existingByName = {};
  team.operators.forEach(op => {
    existingByName[op.name] = existingByName[op.name] || [];
    existingByName[op.name].push(op);
  });

  const result = wanted.map(w => {
    const bucket = existingByName[w.name];
    if(bucket && bucket.length){
      const existing = bucket.shift();
      // обновляем статы из актуального определения (на случай, если JSON поменялся)
      if(w.stats){
        existing.apl = (w.stats.apl !== undefined ? w.stats.apl : existing.apl ?? null);
        existing.move = (w.stats.move !== undefined ? w.stats.move : existing.move ?? null);
        existing.save = (w.stats.save !== undefined ? w.stats.save : existing.save ?? null);
        existing.portrait = (w.stats.portrait !== undefined ? w.stats.portrait : existing.portrait ?? null);
      }
      return existing;
    }
    return defaultOperator(w.name, w.wounds, w.stats);
  });

  team.operators = result;
}

    <div class="kt-roster-list">${team.operators.map(o =>

  return `
  <div class="kt-setup-team team-${team.id==='A'?'a':'b'}" data-team="${team.id}">

      <input class="kt-team-name" data-action="renameTeam" value="${escapeHtml(team.name)}" style="flex:1;">

    <div class="kt-row">

        ${ktOptions}
      </select>

    ${builderHtml}
    <div class="kt-row" style="margin-top:8px;">
      <button class="kt-btn" data-action="importRosterBtn">Импорт JSON ростера</button>

    </div>
    ${finalRosterHtml}

    <div class="kt-h2" style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:12px;">Архетип и Tac Op</div>

function resolveEquipmentItem(team, uniqueId){
  const [kind, id] = uniqueId.split(':');
  if(kind === 'u') return UNIVERSAL_EQUIPMENT.find(e=>e.id===id);
  if(kind === 'f'){
    const factionKey = team.killTeamName && KILL_TEAMS[team.killTeamName] ? KILL_TEAMS[team.killTeamName].equipment : null;
    const list = factionKey ? (FACTION_EQUIPMENT[factionKey] || []) : [];
    return list.find(e=>e.id===id);
  }
  return null;
}

function woundClass(w, max){
  const ratio = max>0 ? w/max : 0;
  if(w<=0) return '';
  if(ratio <= 0.34) return 'low';
  if(ratio <= 0.6) return 'mid';
  return '';
}

function renderWoundTrack(op){
  const segs = [];
  const total = Math.max(op.maxWounds,1);
  for(let i=0;i<total;i++){
    const filled = i < op.wounds;
    const cls = filled ? ('filled ' + woundClass(op.wounds, op.maxWounds)) : '';
    segs.push(`<div class="kt-wound-seg ${cls}" data-seg="${i}"></div>`);
  }
  return segs.join('');
}

const QUICK_TOKENS = ['Poison','INSPIRING','Suspicion'];

// SVG-иконки приказов в стиле Kill Team
function orderIcon(kind){
  if(kind === 'conceal'){
    // Conceal — стрелка вниз в круге (маскировка/укрытие)
    return `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v8M8 11l4 4 4-4"/></svg>`;
  }
  // Engage — стрелка вверх в круге (атака/действие)
  return `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 17V9M8 13l4-4 4 4"/></svg>`;
}

function renderOperator(team, op){
  const isDead = op.wounds <= 0;
  const isInjured = !isDead && op.wounds <= op.maxWounds/2;
  const cls = ['kt-op'];
  if(isInjured) cls.push('injured');
  if(isDead) cls.push('dead');
  if(op.activated) cls.push('activated');

  const tokensHtml = op.tokens.map(t =>
    `<span class="kt-token active" data-tok="${t}">${escapeHtml(t)}<span class="kt-token-x" data-removetok="${t}">×</span></span>`
  ).join('');
  const quickHtml = QUICK_TOKENS.map(t => {
    const active = op.tokens.includes(t);
    return `<button class="kt-quick-token-btn" data-quicktok="${t}" style="${active?'border-color:var(--orange);color:var(--orange);':''}">${t}</button>`;
  }).join('');

  // Кнопка приказа: клик циклически переключает null → conceal → engage → conceal ...
  const orderState = op.order || null;
  const orderBtnCls = ['kt-order-btn'];
  if(orderState === 'conceal') orderBtnCls.push('conceal');
  if(orderState === 'engage') orderBtnCls.push('engage');
  const orderLabel = orderState === 'conceal' ? 'Conceal' : (orderState === 'engage' ? 'Engage' : 'приказ');
  const orderIconKind = orderState === 'engage' ? 'engage' : 'conceal';
  const orderBtnHtml = `
    <button class="${orderBtnCls.join(' ')}" data-action="cycleOrder" title="Переключить приказ (Conceal / Engage)">
      ${orderIcon(orderIconKind)}
      <span class="kt-order-label">${orderLabel}</span>
    </button>`;

  // Статблок (APL/MOVE/SAVE/WOUNDS) — показывается, если в данных оператора есть статы
  const hasStats = (op.apl != null) || (op.move != null) || (op.save != null);
  const statCell = (label, value) => `
    <div class="kt-stat-cell">
      <div class="kt-stat-cell-lbl">${label}</div>
      <div class="kt-stat-cell-val">${value != null ? escapeHtml(String(value)) : '—'}</div>
    </div>`;
  const statblockHtml = hasStats ? `
    <div class="kt-statblock">
      ${statCell('APL', op.apl)}
      ${statCell('MOVE', op.move)}
      ${statCell('SAVE', op.save)}
      ${statCell('W', op.maxWounds)}
    </div>` : '';

  // Портрет — показывается, если в данных указан путь к картинке
  const portraitHtml = op.portrait
    ? `<img class="kt-op-portrait" src="${escapeHtml(op.portrait)}" alt="${escapeHtml(op.name)}" onerror="this.style.display='none'">`
    : '';

  return `
  <div class="${cls.join(' ')}" data-team="${team.id}" data-op="${op.id}">
    <div class="kt-op-top">
      <button class="kt-op-activated-toggle ${op.activated?'on':''}" data-action="toggleActivated" title="Активировался в этот ход"></button>
      ${portraitHtml}
      <input class="kt-op-name ${isDead?'dead-strike':''}" data-action="renameOp" value="${escapeHtml(op.name)}">
      <button class="kt-op-remove" data-action="removeOp" title="Удалить оператора">✕</button>
    </div>
    ${statblockHtml}
    <div class="kt-op-wounds-row">
      <span class="kt-wound-num">${Math.max(op.wounds,0)}/${op.maxWounds}</span>
      <div class="kt-wound-track" data-action="setWoundsFromTrack">${renderWoundTrack(op)}</div>
    </div>
    <div class="kt-op-controls">
      ${orderBtnHtml}
      <button class="kt-dmg-btn kt-heal-btn" data-action="heal" data-amt="1">+1</button>
      <button class="kt-dmg-btn kt-heal-btn" data-action="heal" data-amt="3">+3</button>
      <button class="kt-dmg-btn" data-action="dmg" data-amt="1">−1</button>
      <button class="kt-dmg-btn" data-action="dmg" data-amt="3">−3</button>
      <button class="kt-dmg-btn" data-action="dmg" data-amt="6">−6</button>
      <span class="kt-maxw-lbl">MAX</span>
      <input class="kt-maxw-edit" data-action="setMax" type="number" min="1" value="${op.maxWounds}">
    </div>
    <div class="kt-quick-tokens">${quickHtml}</div>
    <div class="kt-op-tokens">
      ${tokensHtml}
      <button class="kt-token-add" data-action="addCustomToken">+ токен</button>
    </div>
  </div>`;
}

}

document.getElementById('critOpChoices').addEventListener('click', (e)=>{

document.getElementById('randomCritOpBtn').addEventListener('click', ()=>{

  renderSetup(); save();

document.getElementById('setupTeamsContainer').addEventListener('click', (e)=>{
  const teamEl = e.target.closest('[data-team]');
  if(!teamEl) return;
  const team = findTeam(teamEl.getAttribute('data-team'));
  if(!team) return;

  const equipCard = e.target.closest('[data-equip]');
  if(equipCard){
    if(equipCard.classList.contains('disabled')) return;
    const uniqueId = equipCard.getAttribute('data-equip');
    const idx = team.equipmentIds.indexOf(uniqueId);
    if(idx>=0) team.equipmentIds.splice(idx,1);
    else if(team.equipmentIds.length < EQUIPMENT_LIMIT) team.equipmentIds.push(uniqueId);
    renderSetup(); save();
    return;
  }

  const archPill = e.target.closest('[data-archetype]');
  if(archPill){
    const a = archPill.getAttribute('data-archetype');
    team.archetype = (team.archetype===a) ? null : a;
    team.tacOpId = null;
    renderSetup(); save(); return;
  }

  const tacCard = e.target.closest('[data-tacop]');
  if(tacCard){
    team.tacOpId = tacCard.getAttribute('data-tacop');
    renderSetup(); save(); return;
  }

  const action = e.target.closest('[data-action]')?.getAttribute('data-action');

  if(action === 'poolPlus' || action === 'poolMinus'){
    const kt = KILL_TEAMS[team.killTeamName];
    if(!kt) return;
    const name = e.target.getAttribute('data-name');
    const def = kt.pool.find(p=>p.name===name);
    if(!def) return;
    const max = def.maxCopies || 1;
    team.poolCounts = team.poolCounts || {};
    const cur = team.poolCounts[name] || 0;
    const totalPicked = Object.values(team.poolCounts).reduce((a,b)=>a+b,0);

    if(action === 'poolPlus' && cur<max && totalPicked<kt.poolPick){
      team.poolCounts[name] = cur+1;
    } else if(action === 'poolMinus' && cur>0){
      team.poolCounts[name] = cur-1;
    } else { return; }

    rebuildOperatorsFromKillTeam(team);
    renderSetup(); save();
    return;
  }

  if(action === 'clearRoster'){
    if(confirm(`Очистить состав команды «${team.name}»?`)){
      team.operators = [];
      team.killTeamName = null;
      team.poolCounts = {};
      team.equipmentIds = team.equipmentIds.filter(uid => uid.startsWith('u:'));
      renderSetup(); save();
    }
    return;
  }
  if(action === 'importRosterBtn'){
    teamEl.querySelector('[data-action="importRosterFile"]').click();
    return;
  }
});

document.getElementById('setupTeamsContainer').addEventListener('change', (e)=>{
  const teamEl = e.target.closest('[data-team]');
  if(!teamEl) return;
  const team = findTeam(teamEl.getAttribute('data-team'));
  if(!team) return;

  if(e.target.matches('[data-action="renameTeam"]')){
    team.name = e.target.value || team.name;
    save(); return;
  }

  if(e.target.matches('[data-action="selectKillTeam"]')){
    const name = e.target.value;
    team.killTeamName = name || null;
    team.poolCounts = {};
    team.equipmentIds = team.equipmentIds.filter(uid => uid.startsWith('u:')); // faction equipment больше не валидно при смене команды
    if(name){
      rebuildOperatorsFromKillTeam(team);
      if(!team.name || team.name.startsWith('Команда')) team.name = name;
    } else {
      team.operators = [];
    }
    renderSetup(); save();
    return;
  }

  if(e.target.matches('[data-action="importRosterFile"]')){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const parsed = JSON.parse(ev.target.result);
        let ops = [];
        if(Array.isArray(parsed)) ops = parsed;
        else if(Array.isArray(parsed.operators)) ops = parsed.operators;
        else throw new Error('bad shape');
        team.operators = ops.map(o => defaultOperator(o.name || 'Оператор', o.wounds || o.maxWounds || 10));
        team.killTeamName = null;
        team.poolCounts = {};
        team.equipmentIds = team.equipmentIds.filter(uid => uid.startsWith('u:'));
        if(parsed.teamName) team.name = parsed.teamName;
        renderSetup(); save();
      } catch(err){
        alert('Не удалось прочитать JSON ростера. Ожидается массив [{name, wounds}, ...] или {teamName, operators:[...]}.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
});

// ===================== EVENTS: GAME SCREEN =====================
root.addEventListener('click', (e)=>{
  if(state.phase !== 'game') return;

  const tpMinus = e.target.closest('#tpMinus');
  const tpPlus = e.target.closest('#tpPlus');
  if(tpMinus){ state.tp = Math.max(1, state.tp-1); renderGame(); save(); return; }
  if(tpPlus){ state.tp = Math.min(6, state.tp+1); renderGame(); save(); return; }

  const resetAct = e.target.closest('#resetActivations');
  if(resetAct){
    state.teams.forEach(t=>t.operators.forEach(o=>{ o.activated=false; o.order=null; }));
    renderGame(); save(); return;
  }

  const teamEl = e.target.closest('#teamsContainer [data-team]');
  if(!teamEl) return;
  const team = findTeam(teamEl.getAttribute('data-team'));
  if(!team) return;

  // Токены не имеют data-action — обрабатываем их ДО раннего выхода по !action
  const opElForTok = e.target.closest('[data-op]');
  const opForTok = opElForTok ? findOp(team, opElForTok.getAttribute('data-op')) : null;

  if(e.target.closest('[data-quicktok]') && opForTok){
    const t = e.target.closest('[data-quicktok]').getAttribute('data-quicktok');
    const idx = opForTok.tokens.indexOf(t);
    if(idx>=0) opForTok.tokens.splice(idx,1); else opForTok.tokens.push(t);
    renderGame(); save(); return;
  }
  if(e.target.closest('[data-removetok]') && opForTok){
    const t = e.target.closest('[data-removetok]').getAttribute('data-removetok');
    opForTok.tokens = opForTok.tokens.filter(x=>x!==t);
    renderGame(); save(); return;
  }

  const action = e.target.closest('[data-action]')?.getAttribute('data-action');
  if(!action) return;

  if(action === 'cpPlus'){ team.cp++; renderGame(); save(); return; }
  if(action === 'cpMinus'){ team.cp = Math.max(0, team.cp-1); renderGame(); save(); return; }
  if(action === 'vpPlus'){ team.vp++; renderGame(); save(); return; }
  if(action === 'vpMinus'){ team.vp = Math.max(0, team.vp-1); renderGame(); save(); return; }
  if(action === 'killGradePlus'){ team.killGrade = Math.min(5, team.killGrade+1); renderGame(); save(); return; }
  if(action === 'killGradeMinus'){ team.killGrade = Math.max(0, team.killGrade-1); renderGame(); save(); return; }

  if(action === 'addOp'){
    team.operators.push(defaultOperator('Новый оператор', 10));
    renderGame(); save(); return;
  }

  const opEl = e.target.closest('[data-op]');
  const op = opEl ? findOp(team, opEl.getAttribute('data-op')) : null;

  if(action === 'cycleOrder' && op){
    // null → conceal → engage → conceal → ...
    if(op.order === 'conceal') op.order = 'engage';
    else if(op.order === 'engage') op.order = 'conceal';
    else op.order = 'conceal';
    renderGame(); save(); return;
  }
  if(action === 'removeOp' && op){
    if(confirm(`Удалить оператора «${op.name}»?`)){
      team.operators = team.operators.filter(o=>o.id!==op.id);
      renderGame(); save();
    }
    return;
  }
  if(action === 'toggleActivated' && op){ op.activated = !op.activated; renderGame(); save(); return; }
  if(action === 'heal' && op){
    const amt = parseInt(e.target.getAttribute('data-amt'),10);
    op.wounds = Math.min(op.maxWounds, op.wounds + amt);
    renderGame(); save(); return;
  }
  if(action === 'dmg' && op){
    const amt = parseInt(e.target.getAttribute('data-amt'),10);
    op.wounds = Math.max(0, op.wounds - amt);
    renderGame(); save(); return;
  }
  if(action === 'setWoundsFromTrack' && op){
    const seg = e.target.closest('[data-seg]');
    if(seg){
      const idx = parseInt(seg.getAttribute('data-seg'),10);
      const newVal = (op.wounds === idx+1) ? idx : idx+1;
      op.wounds = Math.max(0, Math.min(op.maxWounds, newVal));
      renderGame(); save();
    }
    return;
  }
  if(action === 'addCustomToken' && op){
    const t = prompt('Название токена:');
    if(t && t.trim()){
      if(!op.tokens.includes(t.trim())) op.tokens.push(t.trim());
      renderGame(); save();
    }
    return;
  }
});

root.addEventListener('change', (e)=>{
  if(state.phase !== 'game') return;
  const teamEl = e.target.closest('#teamsContainer [data-team]');
  if(!teamEl) return;
  const team = findTeam(teamEl.getAttribute('data-team'));
  if(!team) return;

  if(e.target.matches('[data-action="renameTeam"]')){ team.name = e.target.value || team.name; save(); return; }

  const opEl = e.target.closest('[data-op]');
  const op = opEl ? findOp(team, opEl.getAttribute('data-op')) : null;
  if(!op) return;

  if(e.target.matches('[data-action="renameOp"]')){ op.name = e.target.value || op.name; save(); return; }
  if(e.target.matches('[data-action="setMax"]')){
    let v = parseInt(e.target.value,10);
    if(isNaN(v) || v<1) v=1;
    op.maxWounds = v;
    op.wounds = Math.min(op.wounds, v);
    renderGame(); save(); return;
  }
});

root.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && (e.target.matches('[data-action="renameTeam"]') || e.target.matches('[data-action="renameOp"]'))){
    e.target.blur();
  }
});

// ===================== FOOTER: EXPORT / IMPORT / NEW GAME =====================
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `killteam_solo_state_tp${state.tp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', ()=>{ document.getElementById('importFile').click(); });
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const parsed = JSON.parse(ev.target.result);
      if(parsed && Array.isArray(parsed.teams) && parsed.teams.length){
        if(parsed.teams.length > 1) parsed.teams = [parsed.teams[0]];
        if(parsed.enemyOperativeCount === undefined) parsed.enemyOperativeCount = 10;
        state = parsed;
        renderAll(); save();
        setStatus('импортировано', true);
      } else { alert('Файл не похож на состояние партии Kill Team.'); }
    } catch(err){ alert('Не удалось прочитать JSON.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('newGameBtn').addEventListener('click', ()=>{
  if(confirm('Начать новую партию? HP, CP, VP, токены, kill grade и отметки активации будут сброшены. Ростеры, Ops и снаряжение останутся.')){
    state.tp = 1;
    state.teams.forEach(t=>{
      t.cp = 2; t.vp = 0; t.killGrade = 0;
      t.operators.forEach(o=>{ o.wounds = o.maxWounds; o.activated = false; o.tokens = []; o.order = null; });
    });
    renderAll(); save();
  }
});

loadTeamsData().then(()=>{ load(); });
